<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="48" y1="0" x2="48" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="bulbGrad" x1="48" y1="22" x2="48" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="40%" stop-color="#ffcc33"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="34" y1="58" x2="64" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <radialGradient id="glow" cx="48" cy="42" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="baseGrad" x1="40" y1="65" x2="40" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b0b8c4"/>
      <stop offset="100%" stop-color="#8a929e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="96" height="96" rx="22" fill="url(#bgGrad)"/>
  <!-- Subtle inner shadow -->
  <rect x="2" y="2" width="92" height="92" rx="20" fill="none" stroke="white" stroke-opacity="0.06"/>
  <!-- Glow behind bulb -->
  <circle cx="48" cy="42" r="30" fill="url(#glow)"/>
  <!-- Lightbulb glass -->
  <path d="M48 18C37 18 28 27 28 38C28 45 32 50 36 54C38 56 39 59 39 62H57C57 59 58 56 60 54C64 50 68 45 68 38C68 27 59 18 48 18Z" fill="url(#bulbGrad)"/>
  <!-- Bulb highlight/shine -->
  <path d="M38 30C40 26 44 23 48 22" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
  <!-- Bar chart inside bulb -->
  <rect x="39" y="50" width="5" height="10" rx="1" fill="#c8850a" fill-opacity="0.6"/>
  <rect x="46" y="45" width="5" height="15" rx="1" fill="#c8850a" fill-opacity="0.6"/>
  <rect x="53" y="40" width="5" height="20" rx="1" fill="#c8850a" fill-opacity="0.6"/>
  <!-- Screw base -->
  <rect x="39" y="62" width="18" height="3" rx="1" fill="url(#baseGrad)"/>
  <rect x="40" y="66" width="16" height="2.5" rx="1" fill="url(#baseGrad)"/>
  <rect x="41" y="69.5" width="14" height="2.5" rx="1" fill="url(#baseGrad)"/>
  <!-- Bottom tip -->
  <path d="M43 72L48 77L53 72" fill="#8a929e"/>
  <!-- Green trend arrow -->
  <path d="M32 58L44 44L52 50L66 32" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <path d="M60 31L67 31L67 38" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow dots on trend line -->
  <circle cx="32" cy="58" r="2.5" fill="#2ecc71"/>
  <circle cx="44" cy="44" r="2.5" fill="#2ecc71"/>
  <circle cx="52" cy="50" r="2.5" fill="#2ecc71"/>
  <circle cx="66" cy="32" r="2.5" fill="#2ecc71"/>
</svg>
