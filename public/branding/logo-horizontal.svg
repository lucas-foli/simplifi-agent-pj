<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="120" y1="0" x2="120" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="bulbGrad" x1="32" y1="10" x2="32" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="40%" stop-color="#ffcc33"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="20" y1="42" x2="46" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <radialGradient id="glow" cx="32" cy="28" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="baseGrad" x1="28" y1="46" x2="28" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b0b8c4"/>
      <stop offset="100%" stop-color="#8a929e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="240" height="64" rx="12" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="238" height="62" rx="11" fill="none" stroke="white" stroke-opacity="0.05"/>
  <!-- Lightbulb mark scaled to fit left side -->
  <g transform="translate(6, 4)">
    <circle cx="26" cy="26" r="20" fill="url(#glow)"/>
    <!-- Bulb glass -->
    <path d="M26 8C19 8 13 14 13 22C13 27 15.5 30 18 33C19.2 34.5 19.8 36 19.8 38H32.2C32.2 36 32.8 34.5 34 33C36.5 30 39 27 39 22C39 14 33 8 26 8Z" fill="url(#bulbGrad)"/>
    <!-- Bulb shine -->
    <path d="M20 16C21.5 13.5 24 12 26 11.5" stroke="white" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Bars inside bulb -->
    <rect x="20" y="30" width="3.5" height="7" rx="0.8" fill="#c8850a" fill-opacity="0.55"/>
    <rect x="25" y="27" width="3.5" height="10" rx="0.8" fill="#c8850a" fill-opacity="0.55"/>
    <rect x="30" y="24" width="3.5" height="13" rx="0.8" fill="#c8850a" fill-opacity="0.55"/>
    <!-- Screw base -->
    <rect x="19.8" y="38" width="12.4" height="2" rx="0.8" fill="url(#baseGrad)"/>
    <rect x="20.5" y="40.5" width="11" height="1.8" rx="0.8" fill="url(#baseGrad)"/>
    <rect x="21.2" y="43" width="9.6" height="1.8" rx="0.8" fill="url(#baseGrad)"/>
    <path d="M23 45L26 49L29 45" fill="#8a929e"/>
    <!-- Green trend arrow -->
    <path d="M12 40L22 28L28 32L42 18" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M37 17L43 17L43 23" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Glow dots -->
    <circle cx="12" cy="40" r="1.8" fill="#2ecc71"/>
    <circle cx="22" cy="28" r="1.8" fill="#2ecc71"/>
    <circle cx="28" cy="32" r="1.8" fill="#2ecc71"/>
    <circle cx="42" cy="18" r="1.8" fill="#2ecc71"/>
  </g>
  <!-- "FinSight" centered vertically -->
  <text x="152" y="32" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" fill="white" letter-spacing="-0.5" dominant-baseline="central" text-anchor="middle">Fin<tspan font-weight="400" fill-opacity="0.92">Sight</tspan></text>
</svg>
